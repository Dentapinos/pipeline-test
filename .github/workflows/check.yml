name: Check
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Maven
        run: mvn clean package

  test:
    needs: [build] #для зависимости тестов от сборки
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run tests with Maven
        run: mvn test
