name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: myapp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/myapp.tar

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/myapp.tar
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load image
        run: docker load < /tmp/myapp.tar

      - name: Deploy to server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: 111.88.158.230
          SERVER_USER: admin
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts
          docker save myapp:latest | ssh -i ~/.ssh/id_rsa $SERVER_USER@$SERVER_HOST "
            docker load &&
            docker stop myapp 2>/dev/null || true &&
            docker rm myapp 2>/dev/null || true &&
            docker stop myapp-test 2>/dev/null || true &&
            docker rm myapp-test 2>/dev/null || true &&
            docker run -d --name myapp-test -p 9001:8080 myapp:latest &&
            sleep 15 &&
            docker exec myapp-test sh -c 'cd /app && mvn test' &&
            docker stop myapp-test &&
            docker rm myapp-test &&
            docker run -d --name myapp -p 9001:8080 myapp:latest
          "
